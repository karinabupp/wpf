<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mapa Mundi Interativo — Pipeline WPF</title>
<!-- Adicionada a biblioteca Chart.js necessária para gerar o gráfico -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #f5f4ee;
    --panel: #ffffff;
    --border: #dedcd2;
    --border-strong: #c4c2b6;
    --text: #2c2c2a;
    --text-muted: #77766f;
    --water: #e6f1fb;
    --land-default: #cecbc0;
    --land-hover: #aeb7c2;
    --accent: #185fa5;
    --accent-dark: #0c447c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: row;
    align-items: stretch;
  }
  #nav-rail {
    flex: 0 0 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 20px 0;
    background: #ffffff;
    border-right: 1px solid var(--border);
    min-height: 100vh;
  }
  .nav-icon-btn {
    position: relative;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-muted);
  }
  .nav-icon-btn svg { width: 20px; height: 20px; }
  .nav-icon-btn:hover { background: var(--land-default); color: var(--text); }
  .nav-icon-btn.active { background: var(--accent); color: #ffffff; }
  .nav-icon-btn[data-tooltip]::after {
    content: attr(data-tooltip);
    position: absolute;
    left: 100%;
    top: 50%;
    transform: translateY(-50%);
    margin-left: 10px;
    background: #2c2c2a;
    color: #ffffff;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 9px;
    border-radius: 5px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s ease;
    z-index: 20;
  }
  .nav-icon-btn[data-tooltip]:hover::after { opacity: 1; }
  #content-column {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    padding: 20px;
  }
  .content-view { width: 100%; }
  .content-view.hidden { display: none; }
  #placeholder-view {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 400px;
    color: var(--text-muted);
    font-size: 15px;
  }

  #goals-wrap { width: 100%; }
  #goals-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }
  #goals-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  #goals-add-btn {
    background: transparent;
    border: 1px dashed var(--border-strong);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    cursor: pointer;
    margin-left: 4px;
  }
  #goals-add-btn:hover { background: var(--land-default); }
  #goals-arrow-legend { display: flex; align-items: center; gap: 14px; font-size: 11.5px; color: var(--text-muted); }
  .goals-legend-item { display: flex; align-items: center; gap: 4px; }
  .goals-legend-item svg { width: 13px; height: 13px; }

  #tasks-wrap { width: 100%; }
  #tasks-logo-row { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 20px; }
  #tasks-subnav { display: flex; align-items: center; gap: 6px; }
  .tasks-subnav-btn {
    position: relative;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-muted);
  }
  .tasks-subnav-btn svg { width: 17px; height: 17px; }
  .tasks-subnav-btn:hover { background: var(--land-default); color: var(--text); }
  .tasks-subnav-btn.active { background: var(--text); border-color: var(--text); color: #ffffff; }
  .tasks-subnav-btn[data-tooltip]::after {
    content: attr(data-tooltip);
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 6px;
    background: #2c2c2a;
    color: #ffffff;
    font-size: 11.5px;
    font-weight: 500;
    padding: 4px 8px;
    border-radius: 5px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s ease;
    z-index: 20;
  }
  .tasks-subnav-btn[data-tooltip]:hover::after { opacity: 1; }
  #tasks-footer { display: flex; align-items: center; justify-content: flex-end; margin-top: 14px; }

  #tasks-late-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tasks-late-item {
    background: #ffffff;
    border: 1px solid var(--border);
    border-left: 4px solid #e24b4a;
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .tasks-late-info .tasks-late-parent { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
  .tasks-late-info .tasks-late-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .tasks-late-info .tasks-late-meta { font-size: 12px; color: #791f1f; margin-top: 3px; }
  .tasks-late-empty { grid-column: 1 / -1; text-align: center; color: var(--text-muted); font-size: 13px; padding: 40px 0; }

  #marketing-wrap { width: 100%; }
  #marketing-logo-row { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 24px; }
  #marketing-sync-status { font-size: 12px; color: var(--text-muted); }
  .mkt-section { margin-bottom: 30px; }
  .mkt-section-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 10px; }
  .mkt-section-head h3 { margin: 0; font-size: 16px; font-weight: 600; }
  .mkt-section-sub { font-size: 12.5px; color: var(--text-muted); }
  .mkt-chart-card {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    height: min(68vh, 640px);
  }

  #tasks-general-filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
  #tasks-general-filter-row label { font-size: 12.5px; color: var(--text-muted); font-weight: 500; }
  #tasks-general-filter {
    border: 1px solid var(--border);
    background: #ffffff;
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
  }
  #tasks-general-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
  }
  .tasks-stat-card {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .tasks-stat-card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .tasks-stat-card-value { font-size: 30px; font-weight: 700; color: var(--text); }
  .tasks-stat-card-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .tasks-stat-breakdown-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12.5px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
  }
  .tasks-stat-breakdown-row:last-child { border-bottom: none; }
  .tasks-stat-breakdown-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }

  #tasks-header h2 { margin: 0; font-size: 20px; font-weight: 600; }
  #tasks-add-btn {
    background: transparent;
    border: 1px dashed var(--border-strong);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    cursor: pointer;
  }
  #tasks-add-btn:hover { background: var(--land-default); }
  #tasks-table { background: #ffffff; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .tasks-row {
    display: grid;
    grid-template-columns: 30px 1fr 150px 130px 130px 200px 240px 158px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    min-height: 56px;
    transition: box-shadow 0.1s ease;
  }
  .tasks-row:last-child { border-bottom: none; }
  .tasks-col-select { display: flex; align-items: center; justify-content: center; padding: 0 !important; }
  .tasks-row-checkbox { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); }
  #tasks-bulk-bar {
    display: none;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #eef3fb;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  #tasks-bulk-bar.show { display: flex; }
  #tasks-bulk-count { font-weight: 600; color: var(--text); }
  #tasks-bulk-delete {
    border: 1px solid #e24b4a;
    background: #ffffff;
    color: #e24b4a;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  #tasks-bulk-delete:hover { background: #e24b4a; color: #ffffff; }
  #tasks-bulk-clear {
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    text-decoration: underline;
  }
  #tasks-bulk-actions { display: flex; align-items: center; gap: 10px; }
  #tasks-bulk-confirm { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  #tasks-bulk-actions.hidden, #tasks-bulk-confirm.hidden { display: none; }
  #tasks-bulk-confirm-yes {
    border: 1px solid #e24b4a;
    background: #e24b4a;
    color: #ffffff;
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  #tasks-bulk-confirm-no {
    border: 1px solid var(--border);
    background: #ffffff;
    color: var(--text);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
  }
  .tasks-drag-handle {
    flex-shrink: 0;
    width: 14px;
    text-align: center;
    color: var(--text-muted);
    cursor: grab;
    opacity: 0;
    font-size: 13px;
    line-height: 1;
    user-select: none;
  }
  .tasks-row:hover .tasks-drag-handle { opacity: 0.55; }
  .tasks-drag-handle:hover { opacity: 1 !important; }
  .tasks-drag-handle:active { cursor: grabbing; }
  .tasks-row-selected { box-shadow: inset 3px 0 0 var(--accent); }
  .tasks-row-dragging { opacity: 0.4; }
  .tasks-row-drop-target { box-shadow: inset 0 0 0 2px var(--accent); }
  .tasks-head-row {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--text-muted);
    background: var(--bg);
    min-height: 42px;
  }
  .tasks-row > div { padding: 0 16px; }
  .tasks-col-name { display: flex; align-items: center; gap: 8px; overflow: hidden; }
  .tasks-toggle {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 12px;
    width: 16px;
    flex-shrink: 0;
    padding: 0;
  }
  .tasks-toggle.empty { visibility: hidden; }
  .tasks-name-input {
    border: none;
    background: transparent;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    width: 100%;
    padding: 8px 4px;
    border-radius: 4px;
  }
  .tasks-name-input:focus { background: var(--bg); outline: 1px solid var(--border-strong); }
  .tasks-name-top { font-weight: 700; }
  .tasks-status-select {
    border: none;
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .tasks-date-input {
    border: none;
    background: transparent;
    font-size: 13.5px;
    color: var(--text);
    width: 100%;
    padding: 8px 4px;
    border-radius: 4px;
  }
  .tasks-date-input:focus { background: var(--bg); outline: 1px solid var(--border-strong); }
  .tasks-assignee-select {
    border: 1px solid var(--border);
    background: #ffffff;
    border-radius: 6px;
    padding: 7px 8px;
    font-size: 13.5px;
    color: var(--text);
    width: 100%;
    cursor: pointer;
    margin-top: 4px;
  }
  .tasks-assignee-new-input {
    border: 1px solid var(--accent);
    background: #ffffff;
    border-radius: 6px;
    padding: 7px 8px;
    font-size: 13.5px;
    color: var(--text);
    width: 100%;
    margin-top: 4px;
  }
  .tasks-assignee-chips { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; }
  .tasks-assignee-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 6px 3px 10px;
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
  }
  .tasks-assignee-remove {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 13px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
  }
  .tasks-assignee-remove:hover { color: #e24b4a; }
  .tasks-assignee-add-btn {
    background: transparent;
    border: 1px dashed var(--border-strong);
    border-radius: 50%;
    width: 22px;
    height: 22px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    line-height: 1;
  }
  .tasks-assignee-add-btn:hover { background: var(--land-default); color: var(--text); }
  .tasks-assignee-summary { cursor: pointer; font-weight: 600; }
  .tasks-assignee-summary:hover { background: var(--land-default); }
  .tasks-assignee-collapse {
    background: transparent;
    border: 1px dashed var(--border-strong);
    border-radius: 50%;
    width: 22px;
    height: 22px;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    line-height: 1;
  }
  .tasks-assignee-collapse:hover { background: var(--land-default); color: var(--text); }
  .tasks-col-assignee-head { display: flex; align-items: center; gap: 6px; }
  .tasks-head-row .tasks-col-assignee { position: relative; }
  #tasks-manage-assignees-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
    padding: 2px;
    line-height: 1;
  }
  #tasks-manage-assignees-btn:hover { color: var(--accent); }
  #tasks-manage-assignees-popover {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 6px;
    z-index: 40;
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 10px;
    width: 240px;
    display: none;
  }
  #tasks-manage-assignees-popover.show { display: block; }
  .tasks-manage-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 8px; }
  .tasks-manage-row { display: flex; align-items: center; gap: 6px; padding: 4px 0; }
  .tasks-manage-name-input {
    flex: 1 1 auto;
    min-width: 0;
    border: 1px solid transparent;
    background: transparent;
    font-size: 13px;
    color: var(--text);
    padding: 4px 6px;
    border-radius: 5px;
  }
  .tasks-manage-name-input:focus { border-color: var(--border-strong); background: var(--bg); outline: none; }
  .tasks-manage-delete-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 13px;
    flex-shrink: 0;
    padding: 2px 4px;
  }
  .tasks-manage-delete-btn:hover { color: #e24b4a; }
  .tasks-manage-empty { font-size: 12px; color: var(--text-muted); padding: 4px 0; }
  .tasks-kpi-select {
    border: 1px solid var(--border);
    background: #ffffff;
    border-radius: 6px;
    padding: 7px 8px;
    font-size: 13px;
    color: var(--text);
    width: 100%;
    cursor: pointer;
  }
  .tasks-col-actions { display: flex; align-items: center; gap: 4px; justify-content: flex-end; }
  .tasks-type-select {
    border: 1px solid var(--border);
    background: #ffffff;
    border-radius: 6px;
    padding: 6px 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    flex-shrink: 0;
  }
  .tasks-action-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 15px;
    cursor: pointer;
    padding: 5px 7px;
    border-radius: 4px;
    line-height: 1;
  }
  .tasks-action-btn:hover { background: var(--land-default); color: var(--text); }
  .tasks-delete-confirm-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fcebeb;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: #791f1f;
  }
  .tasks-delete-confirm-row button {
    border: none;
    border-radius: 5px;
    padding: 4px 10px;
    font-size: 11.5px;
    cursor: pointer;
    font-weight: 500;
  }
  .tasks-delete-yes { background: #e24b4a; color: #fff; }
  .tasks-delete-no { background: transparent; border: 1px solid var(--border-strong) !important; color: var(--text-muted); }

  .goals-tab {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .goals-tab:hover { background: var(--land-default); }
  .goals-tab.active { background: var(--text); color: #ffffff; border-color: var(--text); }
  .goals-tab-count {
    background: rgba(0,0,0,0.08);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 600;
  }
  .goals-tab.active .goals-tab-count { background: rgba(255,255,255,0.22); }

  #goals-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 380px), 1fr));
    align-items: start;
    gap: 14px;
  }
  .goals-card {
    background: #ffffff;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .goals-card-editing { grid-column: span 3; }
  .goals-card[draggable="true"] { cursor: grab; }
  .goals-card[draggable="true"]:active { cursor: grabbing; }
  .goals-card-dragging { opacity: 0.4; }
  .goals-card-drop-before { box-shadow: inset 3px 0 0 var(--accent); }
  .goals-card-drop-after { box-shadow: inset -3px 0 0 var(--accent); }
  .goals-card-top { height: 5px; width: 100%; }
  .goals-card-body { padding: 20px 20px 22px; }
  .goals-card-topline { display: flex; align-items: center; justify-content: space-between; }
  .goals-card-cat-group { display: flex; align-items: center; gap: 8px; }
  .goals-card-cat {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .goals-health-badge { font-size: 11px; font-weight: 600; }
  .goals-edit-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    line-height: 1;
  }
  .goals-edit-btn:hover { background: var(--land-default); color: var(--text); }
  .goals-topline-btns { display: flex; align-items: center; gap: 2px; }
  .goals-pause-btn {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 12px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    line-height: 1;
  }
  .goals-pause-btn:hover { background: var(--land-default); color: var(--text); }
  .goals-card.paused { filter: grayscale(1); opacity: 0.65; }
  .goals-pause-badge {
    display: inline-block;
    margin-top: 8px;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-muted);
    background: var(--land-default);
    padding: 3px 8px;
    border-radius: 5px;
  }
  .goals-card-name { font-size: 18px; font-weight: 600; margin: 8px 0 22px; }
  .goals-kpi-row { display: flex; align-items: baseline; gap: 6px; }
  .goals-trend-arrow { width: 17px; height: 17px; margin-left: 3px; }
  .goals-trend-wrap { display: inline-flex; align-items: center; gap: 2px; margin-left: 3px; }
  .goals-trend-wrap .goals-trend-arrow { margin-left: 0; }
  .goals-trend-delta { font-size: 10.5px; font-weight: 700; white-space: nowrap; }
  .goals-task-icon-btn {
    background: transparent;
    border: none;
    padding: 0;
    cursor: pointer;
    display: flex;
    margin-left: auto;
    align-self: center;
  }

<script>
// Lógica de manipulação de abas e inicialização do gráfico unificado de Marketing
document.addEventListener('DOMContentLoaded', function() {
  
  // Alternância básica entre visões principais (Navigation rail)
  const navButtons = document.querySelectorAll('.nav-icon-btn');
  const contentViews = document.querySelectorAll('.content-view');

  navButtons.forEach(btn => {
    btn.addEventListener('click', () => {
      navButtons.forEach(b => b.classList.remove('active'));
      contentViews.forEach(v => v.classList.add('hidden'));

      btn.classList.add('active');
      const targetView = document.getElementById(btn.id.replace('nav-', '') + '-view');
      if (targetView) targetView.classList.remove('hidden');
    });
  });

  // Função para carregar as informações do Google Sheets e alimentar o gráfico unificado
  async function loadMarketingChart() {
    const statusText = document.getElementById('marketing-sync-status');
    // ID da planilha e o GID fornecido convertidos em endpoint de dados estruturados em JSON
    const spreadsheetId = '1zRHJuj1-aP_KzuK0f7WVDhog3fKve2uXaRJ5JuLC-jE';
    const gid = '1597253817';
    const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&gid=${gid}`;

    try {
      if(statusText) statusText.innerText = "Carregando dados do Google Sheets...";
      
      const response = await fetch(url);
      const text = await response.text();
      
      // Limpando o cabeçalho de proteção da API de visualização do Google para transformar em objeto válido
      const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
      const data = JSON.parse(jsonString);
      
      const rows = data.table.rows;
      
      // Vetores para guardar a informação extraída da tabela
      const labels = [];
      const dataMeta = [];
      const dataRealizado = [];

      // Mapeando as linhas do documento. Ignora a primeira linha se ela for o título das colunas
      rows.forEach((row, index) => {
        if (index === 0) return; // Pula cabeçalho
        
        // Estrutura esperada baseada nas colunas padrão (A: Métrica/Mês, B: Meta, C: Realizado)
        const label = row.c[0] ? row.c[0].v : `Item ${index}`;
        const metaVal = (row.c[1] && row.c[1].v !== null) ? row.c[1].v : 0;
        const realizadoVal = (row.c[2] && row.c[2].v !== null) ? row.c[2].v : 0;

        labels.push(label);
        dataMeta.push(metaVal);
        dataRealizado.push(realizadoVal);
      });

      // Criação dinâmica do novo gráfico consolidado usando Chart.js
      const ctx = document.getElementById('chart-unified-marketing').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [
            {
              label: 'Meta',
              data: dataMeta,
              backgroundColor: '#c4c2b6',
              borderColor: '#2c2c2a',
              borderWidth: 1
            },
            {
              label: 'Realizado',
              data: dataRealizado,
              backgroundColor: '#185fa5',
              borderColor: '#0c447c',
              borderWidth: 1
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'top',
              labels: { font: { family: '-apple-system, sans-serif', size: 13 } }
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  let label = context.dataset.label || '';
                  if (label) label += ': ';
                  if (context.parsed.y !== null) {
                    label += new Intl.NumberFormat('pt-BR').format(context.parsed.y);
                  }
                  return label;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: '#dedcd2' },
              ticks: { font: { family: '-apple-system, sans-serif' } }
            },
            x: {
              grid: { display: false },
              ticks: { font: { family: '-apple-system, sans-serif', size: 12 } }
            }
          }
        }
      });

      if(statusText) statusText.innerText = "Gráfico unificado carregado com sucesso!";

    } catch (error) {
      console.error("Erro ao processar dados da planilha:", error);
      if(statusText) statusText.innerText = "Erro ao carregar dados integrados do Sheets.";
    }
  }

  // Executa o carregamento assíncrono do gráfico
  loadMarketingChart();
});
</script>
